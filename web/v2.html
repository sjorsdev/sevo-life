<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sevo-life — particle organisms</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #04060c; color: #c8c8d0; font-family: 'Berkeley Mono', 'JetBrains Mono', monospace; overflow: hidden; }
  #app { display: grid; grid-template-columns: 1fr 260px; grid-template-rows: auto 1fr; height: 100vh; }
  header {
    grid-column: 1 / -1; padding: 8px 16px;
    display: flex; align-items: center; justify-content: space-between;
    background: #0a0c14; border-bottom: 1px solid #1a1a28;
  }
  header h1 { font-size: 14px; font-weight: 400; letter-spacing: 2px; color: #556; }
  header h1 span { color: #aab; }
  .controls { display: flex; gap: 6px; align-items: center; }
  .controls button {
    background: #12141e; border: 1px solid #2a2a3a; color: #889; padding: 4px 12px;
    font-family: inherit; font-size: 11px; cursor: pointer; border-radius: 3px;
  }
  .controls button:hover { background: #1a1c28; color: #bbc; }
  .controls button.active { background: #1e2030; color: #dde; border-color: #445; }
  .controls select { background: #12141e; border: 1px solid #2a2a3a; color: #889; padding: 3px 6px; font-family: inherit; font-size: 11px; border-radius: 3px; }
  .tick { font-size: 12px; color: #556; font-variant-numeric: tabular-nums; }
  #canvas-wrap { display: flex; align-items: center; justify-content: center; background: #02030a; }
  canvas { border-radius: 2px; }
  #sidebar { background: #08091210; border-left: 1px solid #141420; padding: 12px; overflow-y: auto; font-size: 11px; }
  .panel { margin-bottom: 12px; }
  .panel-title { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: #445; margin-bottom: 5px; padding-bottom: 3px; border-bottom: 1px solid #141420; }
  .stat-row { display: flex; justify-content: space-between; padding: 1px 0; }
  .stat-label { color: #556; }
  .stat-value { color: #99a; font-variant-numeric: tabular-nums; }
  .bar { height: 3px; background: #141420; border-radius: 2px; margin: 2px 0 5px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .org-card { background: #0c0e18; border-radius: 3px; padding: 6px 8px; margin-bottom: 4px; border: 1px solid #181a28; }
  .org-card.dead { opacity: 0.25; }
  .org-name { font-weight: bold; font-size: 10px; margin-bottom: 2px; }
  .org-stat { font-size: 9px; color: #556; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>sevo / <span>life</span></h1>
    <div class="controls">
      <button id="btn-play" class="active">Play</button>
      <button id="btn-pause">Pause</button>
      <button id="btn-restart">Restart</button>
      <select id="speed">
        <option value="50">Slow</option>
        <option value="16" selected>Normal</option>
        <option value="4">Fast</option>
      </select>
      <span class="tick" id="tick-display">0</span>
    </div>
  </header>
  <div id="canvas-wrap"><canvas id="canvas"></canvas></div>
  <div id="sidebar">
    <div class="panel">
      <div class="panel-title">World</div>
      <div class="stat-row"><span class="stat-label">Tick</span><span class="stat-value" id="s-tick">0</span></div>
      <div class="stat-row"><span class="stat-label">Alive</span><span class="stat-value" id="s-alive">0</span></div>
    </div>
    <div class="panel">
      <div class="panel-title">Beauty</div>
      <div class="stat-row"><span class="stat-label">Total</span><span class="stat-value" id="s-beauty">--</span></div>
      <div class="bar"><div class="bar-fill" id="bar-beauty" style="width:0;background:#8a6db0"></div></div>
      <div class="stat-row"><span class="stat-label">Compression Progress</span><span class="stat-value" id="s-form">--</span></div>
      <div class="bar"><div class="bar-fill" id="bar-form" style="width:0;background:#6a8db0"></div></div>
      <div class="stat-row"><span class="stat-label">Order/Complexity</span><span class="stat-value" id="s-sym">--</span></div>
      <div class="bar"><div class="bar-fill" id="bar-sym" style="width:0;background:#6ab08d"></div></div>
      <div class="stat-row"><span class="stat-label">Novelty</span><span class="stat-value" id="s-motion">--</span></div>
      <div class="bar"><div class="bar-fill" id="bar-motion" style="width:0;background:#b0896a"></div></div>
      <div class="stat-row"><span class="stat-label">Entropy</span><span class="stat-value" id="s-div">--</span></div>
      <div class="bar"><div class="bar-fill" id="bar-div" style="width:0;background:#6ab0a8"></div></div>
    </div>
    <div class="panel">
      <div class="panel-title">Organisms</div>
      <div id="org-list"></div>
    </div>
  </div>
</div>

<script type="module">
import { World, DEFAULT_WORLD } from './sim.bundle.js';

const SPECIES = ['Jellyfish', 'Crawler', 'Floater', 'Jellyfish', 'Crawler', 'Floater'];

const jellyfish = {
  growthSteps: [
    { triggerAge: 5, parentType: "core", childType: "flesh", angle: -Math.PI/2, distance: 15, mirror: false, childRadius: 1.2, childColor: "gradient" },
    { triggerAge: 8, parentType: "core", childType: "flesh", angle: -Math.PI/3, distance: 18, mirror: true, childRadius: 1.0, childColor: "gradient" },
    { triggerAge: 12, parentType: "core", childType: "flesh", angle: -Math.PI/6, distance: 20, mirror: true, childRadius: 0.8, childColor: "accent" },
    { triggerAge: 15, parentType: "core", childType: "sensor", angle: Math.PI/2, distance: 20, mirror: false, childRadius: 0.5, childColor: "accent" },
    { triggerAge: 18, parentType: "sensor", childType: "sensor", angle: Math.PI/2, distance: 15, mirror: false, childRadius: 0.4, childColor: "accent" },
    { triggerAge: 20, parentType: "core", childType: "sensor", angle: Math.PI/2+0.4, distance: 18, mirror: true, childRadius: 0.5, childColor: "accent" },
    { triggerAge: 22, parentType: "sensor", childType: "mouth", angle: Math.PI/2, distance: 12, mirror: false, childRadius: 0.6, childColor: "base" },
    { triggerAge: 10, parentType: "flesh", childType: "fin", angle: 0, distance: 12, mirror: true, childRadius: 0.7, childColor: "accent" },
  ],
  maxParticles: 20, baseColor: [100,140,255], accentColor: [200,120,255],
  springStiffness: 0.03, springDamping: 0.05, drag: 0.97, baseRadius: 5,
  resourceAttraction: 0.6, flockingStrength: 0.2, avoidanceRadius: 40, pulseRate: 0.8, swimStrength: 0.4,
};
const crawler = {
  growthSteps: [
    { triggerAge: 3, parentType: "core", childType: "flesh", angle: 0, distance: 12, mirror: false, childRadius: 1.0, childColor: "base" },
    { triggerAge: 6, parentType: "flesh", childType: "flesh", angle: 0, distance: 12, mirror: false, childRadius: 0.9, childColor: "gradient" },
    { triggerAge: 9, parentType: "flesh", childType: "flesh", angle: 0, distance: 12, mirror: false, childRadius: 0.8, childColor: "gradient" },
    { triggerAge: 4, parentType: "core", childType: "sensor", angle: -Math.PI/4, distance: 10, mirror: true, childRadius: 0.5, childColor: "accent" },
    { triggerAge: 7, parentType: "flesh", childType: "fin", angle: Math.PI/2, distance: 8, mirror: true, childRadius: 0.6, childColor: "accent" },
    { triggerAge: 11, parentType: "flesh", childType: "fin", angle: Math.PI/2, distance: 8, mirror: true, childRadius: 0.6, childColor: "accent" },
    { triggerAge: 5, parentType: "core", childType: "mouth", angle: -Math.PI/8, distance: 8, mirror: false, childRadius: 0.7, childColor: "base" },
    { triggerAge: 13, parentType: "flesh", childType: "spike", angle: 0, distance: 10, mirror: false, childRadius: 0.5, childColor: "accent" },
  ],
  maxParticles: 18, baseColor: [80,200,100], accentColor: [200,255,80],
  springStiffness: 0.08, springDamping: 0.1, drag: 0.95, baseRadius: 4,
  resourceAttraction: 0.8, flockingStrength: 0.1, avoidanceRadius: 30, pulseRate: 0.2, swimStrength: 0.7,
};
const floater = {
  growthSteps: [
    { triggerAge: 4, parentType: "core", childType: "flesh", angle: 0, distance: 14, mirror: false, childRadius: 0.8, childColor: "gradient" },
    { triggerAge: 4, parentType: "core", childType: "flesh", angle: Math.PI*2/5, distance: 14, mirror: false, childRadius: 0.8, childColor: "gradient" },
    { triggerAge: 4, parentType: "core", childType: "flesh", angle: Math.PI*4/5, distance: 14, mirror: false, childRadius: 0.8, childColor: "gradient" },
    { triggerAge: 4, parentType: "core", childType: "flesh", angle: Math.PI*6/5, distance: 14, mirror: false, childRadius: 0.8, childColor: "gradient" },
    { triggerAge: 4, parentType: "core", childType: "flesh", angle: Math.PI*8/5, distance: 14, mirror: false, childRadius: 0.8, childColor: "gradient" },
    { triggerAge: 10, parentType: "flesh", childType: "sensor", angle: 0, distance: 10, mirror: false, childRadius: 0.5, childColor: "accent" },
    { triggerAge: 8, parentType: "core", childType: "mouth", angle: Math.PI/2, distance: 8, mirror: false, childRadius: 0.6, childColor: "accent" },
  ],
  maxParticles: 15, baseColor: [255,140,100], accentColor: [255,220,150],
  springStiffness: 0.02, springDamping: 0.03, drag: 0.98, baseRadius: 6,
  resourceAttraction: 0.3, flockingStrength: 0.4, avoidanceRadius: 50, pulseRate: 0.6, swimStrength: 0.2,
};

const genomes = [jellyfish, crawler, floater, jellyfish, crawler, floater];
let world, playing = true, interval = 16;
const vizConfig = { ...DEFAULT_WORLD, maxTicks: Infinity };

function init() { world = new World(vizConfig, genomes, Date.now() % 100000); }
init();

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = DEFAULT_WORLD.width;
canvas.height = DEFAULT_WORLD.height;

function draw() {
  // Chemistry layer — reaction-diffusion patterns (the world's body)
  const chem = world.chem;
  const chemScale = 4; // each chem pixel = 4 world units
  const imgData = ctx.createImageData(chem.width, chem.height);
  for (let i = 0; i < chem.b.length; i++) {
    const b = chem.b[i];
    const a = chem.a[i];
    const idx = i * 4;
    // Chemical B = warm colors (life trace), Chemical A = cool background
    imgData.data[idx] = Math.floor(b * 120 + (1 - a) * 20);     // R
    imgData.data[idx + 1] = Math.floor(b * 60 + a * 8);         // G
    imgData.data[idx + 2] = Math.floor(a * 30 + b * 80);        // B
    imgData.data[idx + 3] = 255;
  }
  // Draw chemistry scaled up to world size
  const chemCanvas = new OffscreenCanvas(chem.width, chem.height);
  const chemCtx = chemCanvas.getContext('2d');
  chemCtx.putImageData(imgData, 0, 0);
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(chemCanvas, 0, 0, canvas.width, canvas.height);

  // Resources — soft glowing circles
  for (const r of world.resources) {
    if (r.amount < 0.05) continue;
    const a = r.amount * 0.4;
    const gradient = ctx.createRadialGradient(r.pos.x, r.pos.y, 0, r.pos.x, r.pos.y, r.radius);
    gradient.addColorStop(0, `rgba(40, 180, 80, ${a})`);
    gradient.addColorStop(1, `rgba(40, 180, 80, 0)`);
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(r.pos.x, r.pos.y, r.radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // Organisms
  for (const org of world.organisms) {
    if (!org.alive) continue;

    // Springs — translucent connections
    ctx.globalAlpha = 0.3;
    for (const spring of org.springs) {
      const a = org.particles[spring.a];
      const b = org.particles[spring.b];
      const midColor = a.color.map((c, i) => Math.round((c + b.color[i]) / 2));
      ctx.strokeStyle = `rgb(${midColor.join(',')})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(a.pos.x, a.pos.y);
      ctx.lineTo(b.pos.x, b.pos.y);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Particles
    for (const p of org.particles) {
      const [r, g, b] = p.color;

      // Glow
      const glow = ctx.createRadialGradient(p.pos.x, p.pos.y, 0, p.pos.x, p.pos.y, p.radius * 3);
      glow.addColorStop(0, `rgba(${r},${g},${b}, 0.15)`);
      glow.addColorStop(1, `rgba(${r},${g},${b}, 0)`);
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(p.pos.x, p.pos.y, p.radius * 3, 0, Math.PI * 2);
      ctx.fill();

      // Body
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.beginPath();
      ctx.arc(p.pos.x, p.pos.y, p.radius, 0, Math.PI * 2);
      ctx.fill();

      // Eye highlight for sensors
      if (p.type === 'sensor') {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(p.pos.x - p.radius * 0.2, p.pos.y - p.radius * 0.2, p.radius * 0.3, 0, Math.PI * 2);
        ctx.fill();
      }

      // Mouth indicator
      if (p.type === 'mouth') {
        ctx.strokeStyle = `rgba(${r*0.5},${g*0.5},${b*0.5}, 0.8)`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(p.pos.x, p.pos.y, p.radius * 0.6, 0, Math.PI);
        ctx.stroke();
      }
    }
  }
}

function updateSidebar() {
  const alive = world.organisms.filter(o => o.alive);
  document.getElementById('s-tick').textContent = world.tick;
  document.getElementById('tick-display').textContent = world.tick;
  document.getElementById('s-alive').textContent = alive.length + '/' + world.organisms.length;

  if (world.tick % 50 === 0) {
    const b = world.beauty.beauty();
    document.getElementById('s-beauty').textContent = b.total.toFixed(3);
    document.getElementById('bar-beauty').style.width = (b.total * 100) + '%';
    document.getElementById('s-form').textContent = b.compressionProgress.toFixed(3);
    document.getElementById('bar-form').style.width = (b.compressionProgress * 100) + '%';
    document.getElementById('s-sym').textContent = b.birkhoff.toFixed(3);
    document.getElementById('bar-sym').style.width = (b.birkhoff * 100) + '%';
    document.getElementById('s-motion').textContent = b.novelty.toFixed(3);
    document.getElementById('bar-motion').style.width = (b.novelty * 100) + '%';
    document.getElementById('s-div').textContent = b.entropy.toFixed(3);
    document.getElementById('bar-div').style.width = (b.entropy * 100) + '%';
  }

  if (world.tick % 30 === 0) {
    const list = document.getElementById('org-list');
    list.innerHTML = '';
    for (let i = 0; i < world.organisms.length; i++) {
      const org = world.organisms[i];
      const [r, g, b] = org.genome.baseColor;
      const card = document.createElement('div');
      card.className = 'org-card' + (org.alive ? '' : ' dead');
      card.innerHTML = `<div class="org-name" style="color:rgb(${r},${g},${b})">${SPECIES[i]} #${org.id}</div>` +
        `<div class="org-stat">${org.particles.length}p · E:${org.energy.toFixed(0)} · age:${org.age}</div>`;
      list.appendChild(card);
    }
  }
}

let lastTime = 0;
let stepsPerFrame = 1;

function loop(time) {
  requestAnimationFrame(loop);
  if (time - lastTime < interval) return;
  lastTime = time;

  if (playing) {
    if (world.isFinished()) init(); // restart with new seed
    for (let i = 0; i < stepsPerFrame; i++) world.step();
  }
  draw();
  if (world.tick % 5 === 0) updateSidebar();
}
requestAnimationFrame(loop);

document.getElementById('btn-play').onclick = () => { playing = true; };
document.getElementById('btn-pause').onclick = () => { playing = false; };
document.getElementById('btn-restart').onclick = () => { init(); };
document.getElementById('speed').onchange = (e) => {
  const v = parseInt(e.target.value);
  if (v <= 4) { interval = 16; stepsPerFrame = 3; }
  else if (v <= 20) { interval = 16; stepsPerFrame = 1; }
  else { interval = v; stepsPerFrame = 1; }
};
</script>
</body>
</html>
